name: JavaScript CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automated-tests:
    name: Build and Automated Tests
    runs-on: ubuntu-latest

    env:
      APP_PACKAGE: ${{ secrets.APP_PACKAGE }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build JavaScript project
        run: npm run build --if-present

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Validate APK exists
        run: test -f app/myapp.apk

      - name: Run Appium tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          profile: Nexus 5
          target: default
          force-avd-creation: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save -accel off
          disable-animations: true
          script: |
            # Start adb server
            adb start-server
            adb kill-server
            adb start-server

            # Wait for emulator to be ready
            for i in {1..60}; do
              adb devices
              BOOTED=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$BOOTED" = "1" ]; then
                echo "Emulator boot completed!"
                break
              fi
              echo "Waiting for emulator boot... attempt $i"
              sleep 5
            done

            # Ensure emulator is online
            adb wait-for-device
            adb devices

            # Start Appium server
            nohup appium --log-level info > appium.log 2>&1 &

            # Run WebdriverIO tests
            npm run wdio

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-artifacts
          path: |
            screenshots/**
            appium.log
            wdio.log
          if-no-files-found: ignore