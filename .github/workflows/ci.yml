name: JavaScript CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automated-tests:
    name: Build and Automated Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_PACKAGE: ${{ secrets.APP_PACKAGE }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build JavaScript project
        run: npm run build --if-present

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Validate APK exists
        run: test -f app/myapp.apk

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Appium tests on Android emulator
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: true
          emulator-boot-timeout: 300
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: |
            set -eu

            # The action already waited for boot; verify device is ready
            echo "Verifying emulator is online..."
            adb devices -l
            adb shell getprop sys.boot_completed

            # Extra settle time for system services
            sleep 5
            adb shell input keyevent 82  # unlock screen

            # Start Appium server in background
            nohup appium --log-level info > appium.log 2>&1 &
            sleep 5  # let Appium initialize

            # Run your WebdriverIO tests
            npm run wdio

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-artifacts
          path: |
            screenshots/**
            allure-report/**
            allure-results/**
            appium.log
            wdio.log
          if-no-files-found: ignore